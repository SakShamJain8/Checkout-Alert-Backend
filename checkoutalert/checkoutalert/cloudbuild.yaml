options:
  logging: CLOUD_LOGGING_ONLY
  machineType: N1_HIGHCPU_8

steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--no-cache'
      - '-t'
      - 'gcr.io/$PROJECT_ID/checkoutalert:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/checkoutalert:$SHORT_SHA'
      - '-f'
      - './Dockerfile'   
      - '.'
    dir: 'checkoutalert/checkoutalert'

  # Step 2: Push to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/checkoutalert:latest'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/checkoutalert:$SHORT_SHA'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'checkoutalert'
      - '--image'
      - 'gcr.io/$PROJECT_ID/checkoutalert:$SHORT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--cpu=1'
      - '--memory=512Mi'
      - '--timeout=3600'
      - '--max-instances=100'
      - '--set-env-vars'
      - 'JWT_SECRET=${_JWT_SECRET},ADMIN_SECRET=${_ADMIN_SECRET},GEMINI_API_KEY=${_GEMINI_API_KEY},MAIL_HOST=${_MAIL_HOST},MAIL_PORT=${_MAIL_PORT},MAIL_USERNAME=${_MAIL_USERNAME},MAIL_PASSWORD=${_MAIL_PASSWORD},SPRING_PROFILES_ACTIVE=prod'

# Store images in GCR for future use
images:
  - 'gcr.io/$PROJECT_ID/checkoutalert:latest'
  - 'gcr.io/$PROJECT_ID/checkoutalert:$SHORT_SHA'

# Build timeout
timeout: '3600s'

# Substitution variables (set these in Cloud Build trigger or command line)
substitutions:
  _JWT_SECRET: 'change-me-to-your-jwt-secret'
  _ADMIN_SECRET: 'change-me-to-your-admin-secret'
  _GEMINI_API_KEY: 'change-me-to-your-gemini-key'
  _MAIL_HOST: 'smtp.gmail.com'
  _MAIL_PORT: '587'
  _MAIL_USERNAME: 'change-me-to-your-email@gmail.com'
  _MAIL_PASSWORD: 'change-me-to-your-app-password'