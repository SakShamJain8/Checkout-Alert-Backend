steps:
  # 1. Build Docker image from subdirectory
  - name: 'gcr.io/cloud-builders/docker'
    dir: 'checkoutalert/checkoutalert'
    args: [
      'build',
      '-t',
      'gcr.io/$PROJECT_ID/checkout-alert-backend',
      '.'
    ]

  # 2. Push image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'push',
      'gcr.io/$PROJECT_ID/checkout-alert-backend'
    ]

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args: [
      'run', 'deploy', 'checkout-alert-backend',
      '--image', 'gcr.io/$PROJECT_ID/checkout-alert-backend',
      '--region', 'asia-south1',
      '--platform', 'managed',
      '--allow-unauthenticated',
      '--port', '8080',
      '--memory', '1Gi',
      '--cpu', '1',
      '--min-instances', '1'
    ]

images:
  - 'gcr.io/$PROJECT_ID/checkout-alert-backend'